
Project:
  name: Hyper_test
  # Where to save runs of models
  save_dir: "/results/LV"
  # When to save the parameters and update plots
  saveat: 1.0e+4 

Network:
  # Which model to use, based on "networks.py"
  name: "DenseNet"
  kwargs:
    in_size: 2
    out_size: "dofs" # Can be specified or "dofs" if NNFE
    width_size: 2048
    depth: 4
    activation: "elu"

  load_model:

Optimizer:
  name: "adam"
  learning_rate: 1.0e-3
  epochs: 2.5e+4
  batch_size: .999
  #epochs: 2.5e+3

  scheduler:
    toggle: True
    boundaries: []
    list:
      s1:
        name: "exponential_decay"
        init_value: 1.0e-4
        decay_rate: 1.0e-2
        transition_steps: 2.5e+4

  options:
    learning_rate:

