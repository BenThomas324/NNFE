
Project:
  name: Hyper_test
  # Where to save runs of models
  save_dir: "/results/VHL"
  # When to save the parameters and update plots
  saveat: 1.0e+4

Network:
  # Which model to use, based on "networks.py"
  name: "ResNet"
  kwargs:
    in_size: 3
    out_size: "dofs" # Can be specified or "dofs" if NNFE
    # hidden_layers: [8, 32, 128, 512, 1024, 2048, 4096, 8192]
    width_size: 4096
    depth: 12
    activation: "celu"

  load_model: "/workspace/bthomas/NNFE/nnfe-scratch-rewrite/results/VHL/73737/model.eqx"

Optimizer:
  name: "adam"
  learning_rate: 1.0e-3
  epochs: 1.0e+6
  batch_size: "full"

  scheduler:
    toggle: True
    boundaries: []
    list:
      s1:
        name: "exponential_decay"
        init_value: 1.0e-5
        decay_rate: 1.0e-3
        transition_steps: 1.0e+6

  options:
    learning_rate:

FE:
  mesh_file: "/mesh_VHL_bigger/mesh.xdmf"
  fiber_file: "/mesh_VHL_bigger/fiber_direction.xdmf"

  constants:
    A1: 12.0
    A2: 8.0
    A3: 26.0
    K: 1.0e+6
    c: 15220.83
    alpha: 2.125
    beta: 1.4

Data:
  PV_file: "/home/bthomas/Desktop/Research/JAXFEM_temp/NNFE/nnfe-scratch-rewrite/data/VHL-PV-loop-data.txt"
  T_Ca_file: "/home/bthomas/Desktop/Research/JAXFEM_temp/NNFE/nnfe-scratch-rewrite/data/T_Ca_vals.txt"

