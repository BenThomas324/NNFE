site_name: CARDIAX-NNFE Documentation

theme:
    name: material
    logo: figures/assets/logo_heart.png
    favicon: figures/assets/logo_heart.png
    font:
        text: Inter
        code: JetBrains Mono
    palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
    features:
        - navigation.tabs
        - navigation.top
        - toc.integrate
        - content.code.copy

nav:
    - Home: index.md
    - API: 
        - Main Functionality: api/main_functionality.md
        - Networks: api/networks.md

    - Tutorials:
        - Overview: tutorials/overview.md
        - Configurations: tutorials/configurations.md
        - Prolate Spheroid: tutorials/prolate_spheroid.md

markdown_extensions:
    - pymdownx.arithmatex:
        generic: true
    - pymdownx.superfences
    - pymdownx.details
    - pymdownx.snippets:
        base_path: docs
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - admonition
    - toc:
        permalink: "¤"
        toc_depth: 4
    - md_in_html
    - attr_list
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
    - stylesheets/extra.css

# This section tells the browser to load MathJax and your custom config
extra_javascript:
    - javascripts/mathjax.js
    - https://polyfill.io/v3/polyfill.min.js?features=es6
    - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
    - search:
        separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
    - mkdocstrings:
        default_handler: python
        handlers:
            python:
                paths: ["src"]
                options:
                    force_inspection: true
                    heading_level: 4
                    inherited_members: true
                    members_order: source
                    show_bases: false
                    show_if_no_docstring: true
                    show_overloads: false
                    show_root_heading: true
                    show_signature_annotations: true
                    show_source: false
                    show_symbol_type_heading: true
                    show_symbol_type_toc: true
