
### What do we want to control from the input file? ###

# Path to input file, mesh, and potentially other things...
directory: "."

### FE object ###
# Mesh, quadrature, dim
# Will need to point to a mesh
# Make a special case if someone says cube?
fe_info:
  framework: "FEM" # FEM or IGA
  mesh_path: "msh/rect.vtk"
  fe_params:
    ele_type: "quad"
    gauss_order: 1
    vec: 1

### Boundary Condition INFO ###

# Potential BC types: Dirichlet, Neumann, Pressure, Spring, ...
# Surface must be tagged, give key value for the surface
bc_info:
  bc1:
    type: "Dirichlet"
    component: [0]
    value: [0.0]
    surface_tag: "bottom"
  bc2:
    type: "Dirichlet"
    component: [0]
    value: [0.0]
    surface_tag: "top"
  bc3:
    type: "Custom"
    function: "a * np.sin(2 * np.pi * x[0])"
    function_params:
      a: 1.
    surface_tag: "left"
    static: True
  bc4:
    type: "Custom"
    function: "-a * np.sin(2 * np.pi * x[0])"
    function_params:
      a: 1.
    surface_tag: "right"
    static: True

### Problem object ###
# PDE to solve (mainly Hyperelasticity)
# Material model to use (allow adjusting constants)
# Boundary conditions to apply
# Faces to apply boundary conditions to (tagged mesh)

pde_info:
  pde_type: "Laplacian"
  material_model: "Poisson" # Defines the get_tensor_map
  material_constants:
    E: 10.
    nu: 0.3
  
### Solver object ###

solver_info:
  solver_type: "Newton"
  
  solver_params:
    max_iter: 20
    atol: 1.0e-6


plot_info:
  plot: True
  filename: "output.png"
