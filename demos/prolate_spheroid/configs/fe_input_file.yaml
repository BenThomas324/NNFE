
### What do we want to control from the input file? ###

# Path to input file, mesh, and potentially other things...
directory: "."

fe_config:
  var: "u"
  mesh_path: "LV.vtk"

  mesh_generator:
    name:
    kwargs:

  kwargs:
    ele_type: "tetrahedron"
    gauss_order: 1
    dim: 3
    vec: 3

pde_config:

  pde_info:
    pde_class: "Hyperelasticity"
    pde_type: "Hao_active"
    material_constants:
    internal_vars:
      u:
        fibers:
          value: "mesh"
        sheets:
          value: "mesh"
        normals:
          value: "mesh"
        TCa:
          value: 1.
          vec: 1

  dirichlet_bc_info:
    u:
      bc1:
        type: "Dirichlet"
        component: [0, 1, 2]
        value: [0.0, 0.0, 0.0]
        surface_tag: "base"
        static: True
        
  surface_maps_info:
    u:
      bc2:
        var: ["n", "p"]
        type: "Pressure"
        value: 1.
        surface_tag: "endo"
        static: False

solver_config:
  name: "Newton"
  kwargs:
    max_iter: 20
    atol: 1.0e-6

plot_info:
  plot: True
  filename: "output.png"
