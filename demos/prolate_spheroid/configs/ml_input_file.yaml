
epochs: 5.e+4
batch_size: 1.
rng_key: 

networks:

  Network1:
    # Which model to use, based on "networks.py"
    name: "ResNet"
    kwargs:
      in_size: 2
      out_size: "dofs" # Can be specified or "dofs" if NNFE
      width_size: 64
      depth: 6
      activation: "swish"
      use_bias: True
      use_final_bias: True

    load_model: #"Results/59554/models/model.eqx" # Provide path to model to be loaded
    static: False

optimizer:
  name: "adam"
  learning_rate: 1.0e-1

  scheduler:
    toggle: True
    boundaries: []
    schedules:
      s1:
        name: "warmup_exponential_decay_schedule"
        kwargs:
          transition_steps: 4.e+4
          decay_rate: 5.0e-02
          init_value: 1.0e-04
          peak_value: 1.0e-03
          warmup_steps: 500
      # s1:
      #   name: "exponential_decay"
      #   kwargs:
      #     init_value: 2.0e-2
      #     transition_steps: 1.e+4
      #     decay_rate: 1.e-1

  optimizer_kwargs:
    learning_rate:
