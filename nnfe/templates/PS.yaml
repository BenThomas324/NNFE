
Project:
  name: Hyper_test
  # Where to save runs of models
  save_dir: "/results/PS"
  # When to save the parameters and update plots
  saveat: 1.0e+4 

Network:
  # Which model to use, based on "networks.py"
  name: "MLP"
  kwargs:
    in_size: 2
    out_size: "dofs" # Can be specified or "dofs" if NNFE
    width_size: 64
    depth: 6
    activation: "elu"
    use_bias: False
    use_final_bias: False

  load_model:

Optimizer:
  name: "adam"
  learning_rate: 1.0e-3
  epochs: 1.0e+4
  batch_size: .5
  #epochs: 2.5e+3

  scheduler:
    toggle: True
    boundaries: []
    list:
      s1:
        name: "exponential_decay"
        init_value: 1.0e-6
        decay_rate: 1.0e-2
        transition_steps: 1.0e+4

  options:
    learning_rate:

FE:
  constants:
    A1: 12.0
    A2: 8.0
    A3: 26.0
    K: 1.0e+6
    c: 15220.83
    alpha: 2.125
    beta: 1.4

Data:
  PV_file: "/home/bthomas/Desktop/Research/JAXFEM_temp/NNFE/nnfe-scratch-rewrite/data/VHL-PV-loop-data.txt"
  T_Ca_file: "/home/bthomas/Desktop/Research/JAXFEM_temp/NNFE/nnfe-scratch-rewrite/data/T_Ca_vals.txt"

